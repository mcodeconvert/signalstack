name: CI
on:
  push: { branches: [main] }
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: node --test --test-reporter=spec "packages/core/test/*.test.js"
      - run: node --test --test-reporter=spec "packages/scraper/test/*.test.js"
      - run: npm run demo:gen
      - run: cd packages/web && npx svelte-kit sync && npx vite build
